<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Todo List</title>
  <link rel="stylesheet" href="css/index.css" />
</head>
<body>
  <div class="container">
    <h1> Todo List</h1>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="Nouvelle tâche..." />
      <button id="addBtn" type="button">Ajouter</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" type="button" data-filter="all">Toutes</button>
      <button class="filter-btn" type="button" data-filter="active">Actives</button>
      <button class="filter-btn" type="button" data-filter="done">Terminées</button>
    </div>

    <p id="counter">0 tâche(s) restante(s)</p>
    <ul id="taskList"></ul>
    <button id="clearDone" type="button"> Supprimer les terminées</button>
  </div>

  <script src="js/index.js"></script>
  <script src="cordova.js"></script>
</body>
</html>
